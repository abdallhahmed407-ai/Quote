name: Deploy Quote Worker (Primary)

on:
  push:
    branches:
      - main
    paths-ignore:
      - deployment-status.json
  workflow_dispatch:

concurrency:
  group: quote-production
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 8
    permissions:
      contents: write
    steps:
      - name: Checkout latest main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Typecheck
        run: npm run typecheck

      - name: Confirm Cloudflare account
        run: npx wrangler whoami
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Deploy explicitly to quote worker
        run: npx wrangler deploy --config wrangler.jsonc --name quote
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Show deployed versions
        run: npx wrangler deployments list --config wrangler.jsonc --name quote
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Verify Riyadh-local date and print button on Cloudflare
        id: verify
        run: |
          verified=0
          proposal_url='https://quote.abdallhahmed407.workers.dev/p/eyJuIjoiNTAxOTEyMDYzMTkxIiwiZCI6IjUwODg3ODQyMTIxMyIsInYiOjI4fQ.OldhRKGe7j9dKMfbQkfMcVRTCtNzCYn3JpH8s9PA3Ss'
          expected_date="$(node -e "console.log(new Intl.DateTimeFormat('ar-EG-u-ca-gregory-nu-arab',{day:'numeric',month:'long',year:'numeric',timeZone:'Asia/Riyadh'}).format(new Date()))")"

          for attempt in 1 2 3 4 5 6 7 8; do
            preview="$(curl -fsS "https://quote.abdallhahmed407.workers.dev/preview?verify=${GITHUB_SHA}-${attempt}")"
            proposal="$(curl -fsS "${proposal_url}?verify=${GITHUB_SHA}-${attempt}")"

            if printf '%s' "$preview" | grep -q 'ojoor-release" content="html-browser-print-v6-riyadh-date' \
              && printf '%s' "$proposal" | grep -q 'ojoor-release" content="html-browser-print-v6-riyadh-date' \
              && printf '%s' "$preview" | grep -q "$expected_date" \
              && printf '%s' "$proposal" | grep -q '>طباعة</button>' \
              && ! printf '%s' "$proposal" | grep -q 'تحميل PDF'; then
              verified=1
              break
            fi

            sleep 10
          done

          test "$verified" = "1"
          echo "expected_date=$expected_date" >> "$GITHUB_OUTPUT"
          echo "Verified Riyadh-local date: $expected_date"

      - name: Record verified production deployment
        run: |
          cat > deployment-status.json <<EOF
          {
            "release": "html-browser-print-v6-riyadh-date",
            "source_commit": "${GITHUB_SHA}",
            "cloudflare_verified": true,
            "proposal_time_zone": "Asia/Riyadh",
            "verified_arabic_date": "${{ steps.verify.outputs.expected_date }}",
            "verified_at_utc": "$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          }
          EOF
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add deployment-status.json
          git commit -m "chore: record verified Cloudflare deployment [skip ci]"
          git push origin HEAD:main
