name: Deploy Quote Worker

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-quote-worker
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    steps:
      - name: Checkout latest main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Typecheck
        run: npm run typecheck

      - name: Deploy corrected HTML print release
        run: npm run deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Verify print-only HTML release
        run: |
          verified=0
          for attempt in 1 2 3 4 5 6; do
            html="$(curl -fsS "https://quote.abdallhahmed407.workers.dev/preview?verify=${GITHUB_SHA}")"
            if printf '%s' "$html" | grep -q 'ojoor-release" content="html-browser-print-v5' \
              && printf '%s' "$html" | grep -q '>طباعة</button>' \
              && printf '%s' "$html" | grep -q 'OJR-PREVIEW-V1' \
              && ! printf '%s' "$html" | grep -q 'تحميل PDF' \
              && ! printf '%s' "$html" | grep -q 'OGR-'; then
              verified=1
              break
            fi
            sleep 10
          done

          test "$verified" = "1"
          echo "Verified corrected HTML print-only release"
