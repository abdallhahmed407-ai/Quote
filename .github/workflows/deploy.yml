name: Deploy Quote Worker

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-quote-worker
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Typecheck
        run: npm run typecheck

      - name: Deploy to Cloudflare Workers
        run: npm run deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Verify deployed release
        run: |
          for attempt in 1 2 3 4 5 6; do
            if curl -fsS "https://quote.abdallhahmed407.workers.dev/preview?verify=${GITHUB_SHA}" | grep -q 'ojoor-release" content="arabic-meta-signatures-v2'; then
              echo "Verified deployed HTML release arabic-meta-signatures-v2"
              break
            fi
            sleep 10
          done

          curl --fail --silent --show-error --location \
            "https://quote.abdallhahmed407.workers.dev/preview?download=1&verify=${GITHUB_SHA}" \
            --output /tmp/ojoor-preview.pdf

          test "$(head -c 5 /tmp/ojoor-preview.pdf)" = "%PDF-"
          test "$(wc -c < /tmp/ojoor-preview.pdf)" -gt 10000
          echo "Verified working PDF download"
